# Mako Configuration - Matugen Template

# Default settings
anchor=top-right
margin=6
padding=10
width=350
height=150
border-size=1
border-radius=6

border-color={{colors.primary.default.hex}}
background-color={{colors.surface.default.hex}}
text-color={{colors.on_surface.default.hex}}
font=IBM Plex Mono 11

# Icon
icons=1
max-icon-size=32
icon-path=/usr/share/icons

# Grouping
group-by=app-name
max-visible=5

# Timeout
default-timeout=5000
ignore-timeout=0

# Progress bar
progress-color=over {{colors.primary.default.hex}}

# Do Not Disturb mode
[mode=do-not-disturb]
invisible=1

# Urgency levels
[urgency=low]
border-color={{colors.secondary.default.hex}}
default-timeout=3000

[urgency=normal]
border-color={{colors.primary.default.hex}}
default-timeout=5000

[urgency=critical]
border-color={{colors.error.default.hex}}
default-timeout=0

# App-specific rules
[app-name="Spotify"]
border-color={{colors.tertiary.default.hex}}
default-timeout=3000

# Volume notification (Steam Deck style)
[app-name="volume"]
anchor=top-center
width=300
height=35
margin=10
padding=0,6
background-color={{colors.surface_container_highest.default.hex}}
text-color={{colors.on_surface.default.hex}}
border-color={{colors.outline.default.hex}}
border-size=1
border-radius=4
progress-color=over {{colors.primary.default.hex}}
font=IBM Plex Mono 12
format=<span font='10'><b>%s</b> %b</span>
max-icon-size=20
default-timeout=2000

# Brightness
[app-name="brightness"]
anchor=top-center
width=300
height=35
margin=10
padding=0,10
background-color={{colors.surface_container_highest.default.hex}}
text-color={{colors.on_surface.default.hex}}
border-color={{colors.outline.default.hex}}
border-size=1
border-radius=4
progress-color=over {{colors.primary.default.hex}}
font=JetBrains Mono Nerd Font 12
format=<span font='10'><b>%s</b> %b</span>
max-icon-size=20
default-timeout=2000
