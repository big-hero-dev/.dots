only_attached = false
truncation_length = 20
truncation_symbol = "â€¦"
disabled = false

[git_commit]
style = "fg:blue bg:bg2"
format = '[ @$hash$tag ]($style)'
commit_hash_length = 7
only_detached = true
tag_symbol = " َ°“¼ "
tag_disabled = false
disabled = false

[git_status]
style = "fg:aqua bg:bg2"
format = '([$all_status$ahead_behind ]($style))'
