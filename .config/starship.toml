command_timeout = 1000
scan_timeout = 3000

format = """
[┌](bold 8)$directory$git_branch$git_status$golang$nodejs$rust$docker_context
[└](bold 8)$character"""

add_newline = true

[character]
success_symbol = "[λ](bold 2)"
error_symbol = "[×](bold 1)"
vimcmd_symbol = "[N](bold 4)"

[directory]
style = "bold 6"
truncation_length = 3
truncation_symbol = "…/"
read_only = "   "

[git_branch]
symbol = " "
style = "bold 5"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold 1"
format = "([(\\[$all_status$ahead_behind\\])]($style) )"

[golang]
symbol = " "
style = "bold 4"
format = "[$symbol($version)]($style) "

[nodejs]
symbol = " "
style = "bold 2"
format = "[$symbol($version)]($style) "

[rust]
symbol = " "
style = "bold 3"
format = "[$symbol($version)]($style) "
